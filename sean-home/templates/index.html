<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sean Home</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ── Ambient background layer ─────────────────────────── -->
  <div class="ambient-bg" aria-hidden="true"></div>

  <!-- ── Header ───────────────────────────────────────────── -->
  <header class="tv-header">

    <div class="tv-header-time">
      <div class="tv-clock" id="clock">{{ time }}</div>
      <div class="tv-date" id="date">{{ date }}</div>
    </div>

    <div class="tv-header-weather" id="header-weather">
      <span class="tv-hw-icon" id="header-weather-icon">—</span>
      <div class="tv-hw-info">
        <span class="tv-hw-temp" id="header-weather-temp">—°</span>
        <span class="tv-hw-desc" id="header-weather-desc">Loading…</span>
      </div>
    </div>

    <div class="tv-brand">Sean Home</div>

  </header>

  <!-- ── Tonight — hero full-width strip ──────────────────── -->
  <section class="tonight-hero" id="tonight-card">
    <div class="tonight-label">Tonight</div>
    <div id="tonight-body" class="tonight-callouts">
      <div class="tn-callout tn-callout-skeleton">
        <div class="tn-co-icon">—</div>
        <div class="tn-co-body"><div class="tn-co-value">—</div><div class="tn-co-label">Loading…</div></div>
      </div>
    </div>
  </section>

  <!-- ── Main content grid ────────────────────────────────── -->
  <div class="tv-content-grid">

    <!-- Sports — wide left column, full height -->
    <section class="card card-sports" id="sports-card">
      <h2 class="card-label">Philly Sports</h2>
      <div class="scoreboard" id="sports-list">
        <div class="sb-placeholder">Loading…</div>
      </div>
    </section>

    <!-- Weather — center column, full height -->
    <section class="card card-weather" id="weather-card">
      <h2 class="card-label">Arvada, CO</h2>
      <div class="weather-body" id="weather-body">
        <div class="weather-icon-wrap">
          <span class="weather-icon" id="weather-icon">—</span>
        </div>
        <div class="weather-temp" id="weather-temp">—°</div>
        <div class="weather-condition" id="weather-condition">Loading…</div>
        <div class="weather-hilo" id="weather-hilo"></div>
      </div>
    </section>

    <!-- Entertainment — right column top -->
    <section class="card card-entertainment" id="jellyfin-card">
      <h2 class="card-label">Entertainment</h2>
      <div id="jellyfin-body" class="jf-body">
        <p class="card-placeholder">Loading…</p>
      </div>
    </section>

    <!-- Gaming — right column bottom -->
    <section class="card card-gaming" id="gaming-card">
      <div class="gaming-grid-line" aria-hidden="true"></div>
      <h2 class="card-label card-label-gaming">Gaming</h2>
      <div id="gaming-body" class="gaming-body">
        <p class="card-placeholder">Loading…</p>
      </div>
    </section>

  </div>

  <!-- ── Media Server — compact status strip ──────────────── -->
  <div class="ms-strip" id="media-server-card">
    <div id="media-server-body" class="ms-strip-body">
      <span class="card-placeholder">Loading system status…</span>
    </div>
  </div>

  <!-- ── Navigation ───────────────────────────────────────── -->
  <nav class="tv-nav">
    <a class="tv-nav-btn" href="http://10.0.0.226:8096/web/index.html#!/movies.html">
      <span class="tv-nav-icon">🎬</span> Movies
    </a>
    <a class="tv-nav-btn" href="http://10.0.0.226:8096/web/index.html#!/tv.html">
      <span class="tv-nav-icon">📺</span> TV Shows
    </a>
    <a class="tv-nav-btn" href="http://10.0.0.226:8096/web/index.html#!/movies.html?genreId=home-videos">
      <span class="tv-nav-icon">🎞️</span> Home Videos
    </a>
    <a class="tv-nav-btn" href="http://10.0.0.226:8096/web/index.html#!/music.html">
      <span class="tv-nav-icon">🎵</span> Music
    </a>
    <a class="tv-nav-btn tv-nav-btn-status" href="/health" title="System Status">●</a>
  </nav>

  <!-- Hidden system card — JS writes IDs; not shown in TV layout -->
  <div style="display:none" id="system-card">
    <span id="disk-pct"></span><span id="disk-free"></span>
    <span id="ram-pct"></span><span id="cpu-pct"></span><span id="cpu-temp"></span>
  </div>

  <script src="/static/js/dashboard.js"></script>
</body>
</html>
